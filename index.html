<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>매일유업 포워딩 비딩 2026 하반기</title>
<style>
  :root {
    --navy: #1F4E79;
    --blue: #2E75B6;
    --lblue: #BDD7EE;
    --green: #70AD47;
    --orange: #ED7D31;
    --red: #C00000;
    --gray: #F2F2F2;
    --dgray: #595959;
    --border: #D9D9D9;
    --yellow: #FFF2CC;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; font-size: 13px; background: #F5F7FA; color: #222; }
  
  /* 공통 */
  .page { display: none; }
  .page.active { display: block; }
  .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
  
  /* 헤더 */
  .top-bar { background: var(--navy); color: white; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; }
  .top-bar h1 { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; }
  .top-bar .sub { font-size: 11px; opacity: 0.7; margin-top: 2px; }
  .nav-btn { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; }
  .nav-btn:hover { background: rgba(255,255,255,0.25); }
  
  /* 로그인 */
  #login-page { min-height: 100vh; align-items: center; justify-content: center; background: linear-gradient(135deg, #1F4E79 0%, #2E75B6 100%); }
  #login-page.active { display: flex; }
  .login-box { background: white; border-radius: 16px; padding: 48px 40px; width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
  .login-logo { text-align: center; margin-bottom: 32px; }
  .login-logo .co { font-size: 13px; color: var(--dgray); }
  .login-logo .title { font-size: 20px; font-weight: 700; color: var(--navy); margin-top: 6px; }
  .login-logo .period { font-size: 12px; color: var(--blue); margin-top: 4px; }
  .role-tabs { display: flex; gap: 8px; margin-bottom: 24px; }
  .role-tab { flex: 1; padding: 10px; border: 1.5px solid var(--border); border-radius: 8px; text-align: center; cursor: pointer; font-size: 12px; color: var(--dgray); transition: all 0.15s; }
  .role-tab.active { border-color: var(--navy); background: var(--navy); color: white; font-weight: 600; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 12px; color: var(--dgray); margin-bottom: 6px; font-weight: 600; }
  .form-group select, .form-group input { width: 100%; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 13px; outline: none; transition: border 0.15s; }
  .form-group select:focus, .form-group input:focus { border-color: var(--blue); }
  .btn-login { width: 100%; padding: 12px; background: var(--navy); color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; transition: background 0.15s; }
  .btn-login:hover { background: #163a5f; }
  .login-err { color: var(--red); font-size: 12px; text-align: center; margin-top: 12px; display: none; }

  /* 포워더 입력 페이지 */
  .fw-header { background: white; border-bottom: 1px solid var(--border); padding: 16px 24px; }
  .fw-header h2 { font-size: 16px; color: var(--navy); font-weight: 700; }
  .fw-header p { font-size: 12px; color: var(--dgray); margin-top: 4px; }
  .info-bar { background: var(--yellow); border: 1px solid #FFD966; border-radius: 8px; padding: 10px 16px; margin: 16px 0; font-size: 12px; color: #7F6000; }
  
  /* 입력 테이블 */
  .input-table-wrap { background: white; border-radius: 12px; border: 1px solid var(--border); overflow: auto; margin-bottom: 20px; }
  .input-table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 1200px; }
  .input-table th { background: var(--navy); color: white; padding: 6px 4px; text-align: center; font-weight: 600; font-size: 10px; border-right: 1px solid rgba(255,255,255,0.15); white-space: nowrap; position: sticky; top: 0; }
  .input-table td { padding: 4px 3px; border-bottom: 1px solid #eee; border-right: 1px solid #f0f0f0; text-align: center; }
  .input-table tr:hover td { background: #f8f9ff; }
  .input-table tr.domestic td.info { background: #EEF2F7; color: var(--dgray); }
  td.info { background: var(--gray); font-size: 11px; color: #444; }
  td.vol { background: #EEF2F7; color: var(--dgray); font-weight: 600; }
  td.total { background: #E8F5E9; color: #2E7D32; font-weight: 700; font-size: 12px; }
  td.nation { font-weight: 600; color: var(--navy); }
  td.no { font-weight: 700; color: var(--dgray); font-size: 11px; }
  .input-table input[type=number] { width: 100%; min-width: 42px; padding: 4px 4px; border: 1.5px solid var(--border); border-radius: 4px; font-size: 11px; text-align: right; outline: none; background: var(--yellow); }
  .input-table input[type=number]:focus { border-color: var(--blue); background: white; }
  .input-table input[type=text] { width: 100%; min-width: 42px; padding: 4px 4px; border: 1.5px solid var(--border); border-radius: 4px; font-size: 11px; outline: none; background: var(--yellow); }
  .input-table input[type=text]:focus { border-color: var(--blue); background: white; }
  .section-divider td { background: #EEF2F7; font-weight: 700; color: var(--navy); font-size: 11px; padding: 6px 10px; text-align: left; }
  
  .btn-submit { background: var(--green); color: white; border: none; padding: 12px 28px; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: background 0.15s; }
  .btn-submit:hover { background: #5a9438; }
  .btn-submit:disabled { background: #aaa; cursor: not-allowed; }
  .btn-save-draft { background: white; color: var(--blue); border: 2px solid var(--blue); padding: 12px 28px; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all 0.15s; }
  .btn-save-draft:hover { background: var(--lblue); }
  .submit-area { display: flex; align-items: center; gap: 12px; padding: 16px 0; flex-wrap: wrap; }
  .submit-divider { width: 1px; height: 32px; background: var(--border); margin: 0 4px; }
  .submit-info { font-size: 11px; color: var(--dgray); line-height: 1.5; }
  .submit-area { display: flex; align-items: center; gap: 16px; padding: 16px 0; }
  .save-status { font-size: 12px; color: var(--dgray); }
  .save-status.saved { color: var(--green); font-weight: 600; }
  .save-status.error { color: var(--red); }

  /* 담당자 대시보드 */
  .dash-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
  .stat-card { background: white; border-radius: 12px; border: 1px solid var(--border); padding: 20px; }
  .stat-card .label { font-size: 12px; color: var(--dgray); margin-bottom: 8px; }
  .stat-card .value { font-size: 26px; font-weight: 700; color: var(--navy); }
  .stat-card .sub { font-size: 11px; color: var(--dgray); margin-top: 4px; }
  .stat-card.green .value { color: var(--green); }
  .stat-card.orange .value { color: var(--orange); }
  
  /* 포워더 제출 현황 */
  .fw-status-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; margin-bottom: 24px; }
  .fw-card { background: white; border-radius: 10px; border: 2px solid var(--border); padding: 14px; text-align: center; transition: all 0.2s; }
  .fw-card.submitted { border-color: var(--green); background: #F1F8E9; }
  .fw-card.submitted .fw-name { color: var(--green); }
  .fw-card .fw-name { font-weight: 700; font-size: 13px; color: var(--dgray); }
  .fw-card .fw-count { font-size: 11px; color: var(--dgray); margin-top: 4px; }
  .fw-card .fw-badge { display: inline-block; margin-top: 6px; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; }
  .fw-card.submitted .fw-badge { background: var(--green); color: white; }
  .fw-card:not(.submitted) .fw-badge { background: var(--border); color: var(--dgray); }

  /* 순위 테이블 */
  .rank-table-wrap { background: white; border-radius: 12px; border: 1px solid var(--border); overflow: auto; margin-bottom: 20px; }
  .rank-table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 900px; }
  .rank-table th { background: var(--navy); color: white; padding: 8px; text-align: center; font-size: 11px; }
  .rank-table td { padding: 6px 8px; border-bottom: 1px solid #eee; text-align: center; }
  .rank-table tr:hover td { background: #f8f9ff; }
  .rank-1 { background: #E8F5E9; color: #2E7D32; font-weight: 700; }
  .rank-2 { background: #F3F8E8; color: #558B2F; }
  .rank-3 { background: #FFFDE7; color: #F57F17; }
  .rank-4 { background: #FFF3E0; color: #E65100; }
  .no-data { color: #aaa; font-style: italic; }

  .report-section { background: white; border-radius: 12px; border: 1px solid var(--border); padding: 24px; margin-bottom: 20px; }
  .report-section h3 { font-size: 15px; font-weight: 700; color: var(--navy); margin-bottom: 16px; padding-bottom: 10px; border-bottom: 2px solid var(--lblue); }
  .summary-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .summary-table th { background: var(--navy); color: white; padding: 8px 12px; text-align: center; }
  .summary-table td { padding: 8px 12px; border-bottom: 1px solid #eee; text-align: right; }
  .summary-table td:first-child { text-align: left; font-weight: 600; }
  .summary-table tr.total { background: var(--lblue); font-weight: 700; }
  .highlight { color: #1565C0; font-weight: 700; }  /* 절감: 파랑 */
  .negative { color: var(--red); font-weight: 700; }

  /* 탭 */
  .tabs { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 2px solid var(--border); }
  .tab { padding: 10px 20px; cursor: pointer; font-size: 13px; color: var(--dgray); border-bottom: 2px solid transparent; margin-bottom: -2px; font-weight: 600; }
  .tab.active { color: var(--navy); border-bottom-color: var(--navy); }

  /* 섹션 제목 */
  .sec-title { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .sec-title h3 { font-size: 15px; font-weight: 700; color: var(--navy); }
  .btn-sm { padding: 6px 14px; border-radius: 6px; font-size: 12px; cursor: pointer; border: 1.5px solid; font-weight: 600; }
  .btn-primary { background: var(--navy); color: white; border-color: var(--navy); }
  .btn-primary:hover { background: #163a5f; }
  .btn-outline { background: white; color: var(--navy); border-color: var(--navy); }
  .btn-outline:hover { background: var(--gray); }

  /* 토스트 */
  .toast { position: fixed; bottom: 24px; right: 24px; background: #333; color: white; padding: 12px 20px; border-radius: 8px; font-size: 13px; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; }

  @media (max-width: 768px) {
    .dash-grid { grid-template-columns: repeat(2,1fr); }
    .fw-status-grid { grid-template-columns: repeat(3,1fr); }
  }

  .settings-section { background:white; border-radius:10px; border:1px solid var(--border); padding:20px; margin-bottom:16px; }
  .settings-section h4 { font-size:13px; font-weight:700; color:var(--navy); margin-bottom:14px; padding-bottom:8px; border-bottom:1.5px solid var(--lblue); }
  .item-list { display:flex; flex-direction:column; gap:8px; margin-bottom:12px; }
  .item-row { display:flex; align-items:center; gap:8px; padding:8px 12px; background:var(--gray); border-radius:7px; }
  .item-row .item-num { font-weight:700; color:var(--dgray); font-size:12px; min-width:24px; }
  .item-row input { flex:1; padding:5px 8px; border:1.5px solid var(--border); border-radius:5px; font-size:12px; outline:none; }
  .item-row input:focus { border-color:var(--blue); }
  .item-row .del-btn { background:none; border:none; color:#ccc; cursor:pointer; font-size:16px; padding:0 4px; }
  .item-row .del-btn:hover { color:var(--red); }
  .add-row { display:flex; gap:8px; margin-top:4px; }
  .add-row input { flex:1; padding:7px 10px; border:1.5px solid var(--border); border-radius:6px; font-size:12px; outline:none; }
  .add-row input:focus { border-color:var(--blue); }
  .btn-add { background:var(--blue); color:white; border:none; padding:7px 16px; border-radius:6px; font-size:12px; font-weight:700; cursor:pointer; white-space:nowrap; }
  .btn-add:hover { background:#1a5fa8; }
  .route-row { display:grid; grid-template-columns:40px 75px 65px 85px 85px 65px 55px 80px 80px 80px 80px 70px 70px 90px 30px; gap:5px; align-items:center; padding:6px 10px; background:var(--gray); border-radius:6px; }
  .route-row input { padding:4px 6px; border:1.5px solid var(--border); border-radius:4px; font-size:11px; outline:none; width:100%; }
  .route-row input:focus { border-color:var(--blue); }
  .route-row .no-label { font-weight:700; color:var(--dgray); font-size:12px; text-align:center; }
  .save-banner { background:#E8F5E9; border:1px solid #A5D6A7; border-radius:8px; padding:10px 16px; font-size:12px; color:#2E7D32; font-weight:600; display:none; margin-bottom:12px; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
</head>
<body>

<!-- 로그인 페이지 -->
<div id="login-page" class="page active">
  <div class="login-box">
    <div class="login-logo">
      <div class="co">매일유업 해외사업기획팀</div>
      <div class="title">포워딩 비딩 시스템</div>
      <div class="period">2026년 하반기 (2026.07 ~ 2026.12)</div>
    </div>
    <div class="form-group">
      <label>업체 선택</label>
      <select id="fw-select">
        <option value="">-- 업체를 선택하세요 --</option>
        <option value="람세스">람세스</option>
        <option value="원스탑">원스탑</option>
        <option value="판토스">판토스</option>
        <option value="태웅">태웅</option>
        <option value="JPI">JPI</option>
        <option value="솔트랜스">솔트랜스</option>
        <option value="오리엔트">오리엔트</option>
      </select>
    </div>
    <div class="form-group">
      <label>비딩 코드</label>
      <input type="password" id="fw-password" placeholder="담당자에게 문의하세요">
    </div>
    <button class="btn-login login-btn" onclick="doLogin()">입장하기</button>
    <div class="login-err" id="login-err"></div>
    <div style="margin-top:16px;text-align:center;font-size:12px;color:#aaa;">
      담당자이신가요? <a href="/admin-login" style="color:#2E75B6;text-decoration:none;">관리자 로그인 →</a>
    </div>
  </div>
</div>
<!-- 포워더 입력 페이지: 로그인 후 JS로 동적 렌더링 -->
<div id="fw-page" class="page"></div>

<div class="toast" id="toast"></div>

<script>
const EXCHANGE_RATE = 1450;
const PLAN_SALES = 3586500000;
const PLAN_LOGISTICS = 282110000;
const F_SALES = 23423904724;
const F_LOGISTICS = 1470281964;

// FORWARDERS/ROUTES/WORKSITES는 서버에서만 관리 (api/config.js)
const VOL = {2:81,3:40,4:2,5:24,6:18,8:90,10:20,12:10,14:5,16:6,17:3,18:6,19:5,20:6,22:2,24:4,26:4,28:2,29:7};



let currentFw = null;

let fwData = {}; // 현재 포워더 입력 데이터
let allSubmissions = {}; // 전체 제출 데이터 (admin용)
let evalScores = {}; // 종합평가 점수

// ── 설정값 (api/config.js에서 로드 - 로그인 후에만)
let cfgForwarders = [];
let cfgFwPasswords = {};
let cfgRoutes = [];
let cfgExRate = EXCHANGE_RATE;
let cfgPlanSales = PLAN_SALES;
let cfgPlanLogistics = PLAN_LOGISTICS;
let cfgFSales = F_SALES;
let cfgFLogistics = F_LOGISTICS;
let cfgPrevCSales = 0;
let cfgPrevCLogistics = 0;
let cfgPrevFSales = 0;
let cfgPrevFLogistics = 0;
let cfgFwPw = '';


let cfgWorksites = [];

async function loadWorksites() {
  const saved = await loadFromStorage('cfg_worksites');
  if(saved && saved.length > 0) cfgWorksites = saved;
}

function updateFwDropdown() {
  const sel = document.getElementById('fw-select');
  if(!sel) return;
  const cur = sel.value;
  sel.innerHTML = '<option value="">-- 업체를 선택하세요 --</option>';
  cfgForwarders.forEach(fw => {
    const opt = document.createElement('option');
    opt.value = fw; opt.textContent = fw;
    if(fw === cur) opt.selected = true;
    sel.appendChild(opt);
  });
}

function updateFwWorksiteDisplay() {
  const el = document.getElementById('fw-worksite-list');
  if(!el) return;
  if(!cfgWorksites || cfgWorksites.length === 0) return;
  el.innerHTML = cfgWorksites.map(function(ws) {
    return (ws.name ? '<strong>' + ws.name + ':</strong> ' : '') + (ws.addr || '');
  }).join('<br>');
}

async function loadSettings() {
  const token = sessionStorage.getItem('bidding_token');
  if (!token) return;

  try {
    const res = await fetch('/api/config', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token })
    });

    if (res.status === 401) {
      sessionStorage.removeItem('bidding_token');
      sessionStorage.removeItem('bidding_fw');
      showPage('login-page');
      return;
    }

    const data = await res.json();
    if (!res.ok) throw new Error(data.error);

    if (data.routes     && data.routes.length > 0)     cfgRoutes     = data.routes;
    if (data.forwarders && data.forwarders.length > 0) cfgForwarders = data.forwarders;
    if (data.worksites  && data.worksites.length > 0)  cfgWorksites  = data.worksites;

    if (data.basic) {
      if (data.basic.exRate)         cfgExRate         = data.basic.exRate;
      if (data.basic.planSales)      cfgPlanSales      = data.basic.planSales;
      if (data.basic.planLogistics)  cfgPlanLogistics  = data.basic.planLogistics;
      if (data.basic.fSales)         cfgFSales         = data.basic.fSales;
      if (data.basic.fLogistics)     cfgFLogistics     = data.basic.fLogistics;
      if (data.basic.prevCSales)     cfgPrevCSales     = data.basic.prevCSales;
      if (data.basic.prevCLogistics) cfgPrevCLogistics = data.basic.prevCLogistics;
      if (data.basic.prevFSales)     cfgPrevFSales     = data.basic.prevFSales;
      if (data.basic.prevFLogistics) cfgPrevFLogistics = data.basic.prevFLogistics;
      if (data.basic.fwPw)           cfgFwPw           = data.basic.fwPw;
    }

    updateFwDropdown();
  } catch(e) {
    console.error('loadSettings 오류:', e);
  }
}

// evalScores 초기화 (cfgForwarders 로드 후 showFwPage에서 갱신됨)
const _defaultFwdrs = ['람세스','원스탑','판토스','태웅','JPI','솔트랜스','오리엔트'];
_defaultFwdrs.forEach(fw => { evalScores[fw] = {stability:0, network:0, response:0}; });
evalScores['람세스'] = {stability:3, network:2, response:5};
evalScores['원스탑'] = {stability:3, network:2, response:5};
evalScores['판토스'] = {stability:3, network:2, response:4};
evalScores['태웅']   = {stability:3, network:2, response:5};
evalScores['JPI']   = {stability:2, network:2, response:3};

// ── 스토리지 (Vercel KV API 기반 — 모든 기기에서 공유)
async function saveToStorage(key, value) {
  try {
    const res = await fetch('/api/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ key, value })
    });
    if (!res.ok) throw new Error(await res.text());
    // 로컬에도 캐시 (오프라인 대비)
    try { localStorage.setItem('bidding_cache_' + key, JSON.stringify(value)); } catch(e) {}
    return true;
  } catch(e) {
    console.error('저장 실패:', e);
    // API 실패 시 로컬 캐시로 fallback
    try { localStorage.setItem('bidding_cache_' + key, JSON.stringify(value)); return true; } catch(e2) { return false; }
  }
}

async function loadFromStorage(key) {
  try {
    const res = await fetch('/api/load?key=' + encodeURIComponent(key));
    if (res.status === 404) return null;
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    return data.value ?? null;
  } catch(e) {
    console.warn('API 로드 실패, 캐시 사용:', e);
    // API 실패 시 로컬 캐시로 fallback
    try {
      const v = localStorage.getItem('bidding_cache_' + key);
      return v ? JSON.parse(v) : null;
    } catch(e2) { return null; }
  }
}

async function deleteFromStorage(key) {
  try {
    await fetch('/api/save', {
      method: 'POST',

async function doLogin() {
  // 포워더 로그인만 처리 (관리자는 /admin-login 별도 페이지)
  const fw = document.getElementById('fw-select').value;

  if(!fw) { showLoginErr('업체를 선택해주세요.'); return; }

  const loginBtn = document.querySelector('.login-btn');
  if(loginBtn) { loginBtn.disabled = true; loginBtn.textContent = '확인 중...'; }

  try {
    const res = await fetch('/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ role: 'forwarder', fw, password })
    });
    const data = await res.json();

    if(!res.ok) {
      showLoginErr(data.error || '비밀번호가 올바르지 않습니다.');
      return;
    }

    sessionStorage.setItem('bidding_token', data.token);

    showFwPage();
  } catch(e) {
    showLoginErr('서버 연결 오류. 잠시 후 다시 시도하세요.');
  } finally {
    if(loginBtn) { loginBtn.disabled = false; loginBtn.textContent = '입장하기'; }
  }

async function handleExcelUpload(input) {
  const file = input.files[0];
  if(!file) return;

  const status = document.getElementById('upload-status');
  status.textContent = '읽는 중...';

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, {type:'array'});

      const sheetName = wb.SheetNames.find(n =>
        n.includes('견적') || n.includes('포워더') || n.includes('Sheet')
      ) || wb.SheetNames[0];
      const ws = wb.Sheets[sheetName];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:'', raw:true});

      // 업체명 확인 (B2)
      const companyName = rows[1] ? String(rows[1][1]||'').trim() : '';
      if(companyName && companyName !== currentFw) {
        if(!confirm('파일의 업체명(' + companyName + ')과 로그인 업체(' + currentFw + ')가 다릅니다.\n계속 불러올까요?')) {
          status.textContent = '취소됨'; input.value = ''; return;
        }
      }

      // 헤더행 찾기
      let headerRow = 4;
      for(let i=0; i<Math.min(rows.length,10); i++) {
        const a = String(rows[i][0]||'').trim();
        const b = String(rows[i][1]||'').trim();
        if(a==='NO' || b==='도착국가') { headerRow = i; break; }
      }

      // 열 매핑 (헤더 키워드 자동 탐색)
      const hdr = rows[headerRow] || [];
      function colIdx(keyword) {
        const kw = keyword.replace(/[\s\n]/g,'');
        for(let col=0; col<hdr.length; col++) {
          if(String(hdr[col]||'').replace(/[\s\n]/g,'').includes(kw)) return col;
        }
        return -1;
      }
      function colIdxNth(keyword, nth) {
        const kw = keyword.replace(/[\s\n]/g,'');
        let found = 0;
        for(let col=0; col<hdr.length; col++) {
          if(String(hdr[col]||'').replace(/[\s\n]/g,'').includes(kw)) {
            found++; if(found === nth) return col;
          }
        }
        return -1;
      }
      const sumCol = colIdx('합계');
      function ciAfterSum(keyword, fallback) {
        const kw = keyword.replace(/[\s\n]/g,'');
        for(let col = (sumCol > 0 ? sumCol+1 : 19); col < hdr.length; col++) {
          if(String(hdr[col]||'').replace(/[\s\n]/g,'').includes(kw)) return col;
        }
        return fallback;
      }
      const CI = {
        no:7,  // 사용 안 함 (항상 col 0)
        ofrt:     colIdx('O/FRT')   !== -1 ? colIdx('O/FRT')   : 7,
        lss:      colIdx('LSS')     !== -1 ? colIdx('LSS')     : 8,
        ams:      colIdx('AMS')     !== -1 ? colIdx('AMS')     : 9,
        thc:      colIdx('THC')     !== -1 ? colIdx('THC')     : 10,
        inland:   colIdx('내륙운송')  !== -1 ? colIdx('내륙운송')  : 11,
        doc:      colIdx('DOC')     !== -1 ? colIdx('DOC')     : 12,
        wfg:      colIdx('WFG')     !== -1 ? colIdx('WFG')     : 13,
        sef:      colIdx('SEF')     !== -1 ? colIdx('SEF')     : 14,
        psc:      colIdx('PSC')     !== -1 ? colIdx('PSC')     : 15,
        psm:      colIdx('PSM')     !== -1 ? colIdx('PSM')     : 16,
        etc_krw:  colIdx('기타비용')  !== -1 ? colIdx('기타비용')  : 17,
        etc_usd:  colIdxNth('기타비용',2) !== -1 ? colIdxNth('기타비용',2) : 18,
        ins:      ciAfterSum('적하보험', 20),
        sch:      ciAfterSum('주당항차', 21),
        freetime: ciAfterSum('프리타임', 22),
        note:     ciAfterSum('비고', 23),
      };

      let count = 0;
      for(let i = headerRow+1; i < rows.length; i++) {
        const row = rows[i];
        const no = parseInt(row[0]);
        if(!no || isNaN(no)) continue;
        if(String(row[0]||'').includes('작성 완료')) continue;

        const ofrt    = parseFloat(row[CI.ofrt])    || 0;
        const lss     = parseFloat(row[CI.lss])     || 0;
        const ams     = parseFloat(row[CI.ams])     || 0;
        const thc     = parseFloat(row[CI.thc])     || 0;
        const inland  = parseFloat(row[CI.inland])  || 0;
        const doc     = parseFloat(row[CI.doc])     || 0;
        const wfg     = parseFloat(row[CI.wfg])     || 0;
        const sef     = parseFloat(row[CI.sef])     || 0;
        const psc     = parseFloat(row[CI.psc])     || 0;
        const psm     = parseFloat(row[CI.psm])     || 0;
        const etc_krw = parseFloat(row[CI.etc_krw]) || 0;
        const etc_usd = parseFloat(row[CI.etc_usd]) || 0;
        const ins     = parseFloat(row[CI.ins])     || 0;
        const sch      = row[CI.sch]      ? String(row[CI.sch])      : '';
        const freetime = row[CI.freetime] ? String(row[CI.freetime]) : '';
        const note     = row[CI.note]     ? String(row[CI.note])     : '';

        if(ofrt||lss||ams||thc||inland||doc||wfg||sef||psc||psm||etc_krw||etc_usd||ins||sch||freetime||note) {
          if(!fwData[no]) fwData[no] = {};
          Object.assign(fwData[no], {ofrt,lss,ams,thc,inland,doc,wfg,sef,psc,psm,etc_krw,etc_usd,ins,sch,freetime,note});
          count++;
        }
      }

      buildFwTable();
      autoSave();

      status.textContent = count > 0
        ? '✓ ' + count + '개 구간 불러오기 완료!'
        : '데이터를 찾지 못했어요. 파일을 확인해주세요.';
      setTimeout(() => status.textContent = '', 5000);

    } catch(err) {
      console.error(err);
      let errMsg = err.message || '';
      if(errMsg.includes('Encrypted') || errMsg.includes('CFB')) {
        status.textContent = '❌ 파일이 암호화됐거나 구버전입니다. xlsx로 다시 저장 후 업로드하세요.';
      } else {
        status.textContent = '파일 읽기 실패: ' + errMsg;
      }
    }
    input.value = '';
  };
  reader.readAsArrayBuffer(file);
}

function checkLockout() {
  if(loginAttempts.lockedUntil > Date.now()) {
    const remaining = Math.ceil((loginAttempts.lockedUntil - Date.now()) / 1000);
    showLoginErr(`로그인 시도가 너무 많습니다. ${remaining}초 후 다시 시도하세요.`);
    return true;
  }
  return false;
}

function recordFailedAttempt() {
  loginAttempts.count++;
  if(loginAttempts.count >= 5) {
    loginAttempts.lockedUntil = Date.now() + 10 * 60 * 1000; // 10분 잠금
        showLoginErr('5회 실패. 10분간 로그인이 잠깁니다.');
  } else {
    const remaining = 5 - loginAttempts.count;
    showLoginErr(`비밀번호가 올바르지 않습니다. (${remaining}회 남음)`);
  }
}

function buildFwTable() {
  const tbody = document.getElementById('fw-tbody');
  tbody.innerHTML = '';
  let lastNation = '';

  cfgRoutes.forEach(route => {
    if(!route.nation && route.no >= 30 && route.no <= 35) {
      // 빈 슬롯 (NO 30~35)
      const tr = document.createElement('tr');
      tr.innerHTML = `<td class="no">${route.no}</td><td colspan="19" style="color:#ccc;font-style:italic;font-size:11px;">빈 슬롯 (추가 노선 발생 시 담당자 공지)</td>`;
      tbody.appendChild(tr);
      return;
    }

    if(route.nation && route.nation !== lastNation && route.nation !== '') {
      lastNation = route.nation;
      const divider = document.createElement('tr');
      divider.className = 'section-divider';
      divider.innerHTML = `<td colspan="21">${route.nation === '국내' ? '🏠 국내 구간' : `🌏 ${route.nation}`}</td>`;
      tbody.appendChild(divider);
    }

    const d = fwData[route.no] || {};
    const isDom = route.nation === '국내';
    const vol = route.vol || '';
    const total = calcTotal(d);

    const tr = document.createElement('tr');
    tr.className = isDom ? 'domestic' : '';
    tr.innerHTML = `
      <td class="no">${route.no}</td>
      <td class="info nation">${route.nation||''}</td>
      <td class="info">${route.site||''}</td>
      <td class="info">${route.port_o||''}</td>
      <td class="info">${route.port_i||''}</td>
      <td class="info">${route.ctnr||''}</td>
      <td class="vol">${vol}</td>
      ${inp(route.no,'ofrt',d.ofrt,'number','0.00')}
      ${inp(route.no,'lss',d.lss,'number','0.00')}
      ${inp(route.no,'ams',d.ams,'number','0.00')}
      ${inp(route.no,'thc',d.thc,'number','0')}
      ${inp(route.no,'inland',d.inland,'number','0')}
      ${inp(route.no,'doc',d.doc,'number','0')}
      ${inp(route.no,'wfg',d.wfg,'number','0')}
      ${inp(route.no,'sef',d.sef,'number','0')}
      ${inp(route.no,'psc',d.psc,'number','0')}
      ${inp(route.no,'psm',d.psm,'number','0')}
      ${inp(route.no,'etc_krw',d.etc_krw,'number','0')}
      ${inp(route.no,'etc_usd',d.etc_usd,'number','0.00')}
      <td class="total" id="total-${route.no}">${total ? fmt(total) : ''}</td>
      ${inp(route.no,'ins',d.ins,'number','0.00000')}
      ${inp(route.no,'sch',d.sch,'text','')}
      ${inp(route.no,'freetime',d.freetime,'text','')}
      ${inp(route.no,'note',d.note,'text','')}
    `;
    tbody.appendChild(tr);
  });

  // 이벤트
  tbody.querySelectorAll('input').forEach(el => {
    el.addEventListener('input', () => onInputChange(el));
  });
}

function inp(no, field, val, type, step) {
  const v = val !== undefined && val !== null ? val : '';
  if(type === 'text') {
    return `<td><input type="text" data-no="${no}" data-field="${field}" value="${v}" placeholder=""></td>`;
  }
  return `<td><input type="number" data-no="${no}" data-field="${field}" value="${v}" step="${step}" placeholder="0" min="0"></td>`;
}

function onInputChange(el) {
  const no = parseInt(el.dataset.no);
  const field = el.dataset.field;
  const val = el.type === 'number' ? (parseFloat(el.value)||0) : el.value;

  if(!fwData[no]) fwData[no] = {};
  fwData[no][field] = val;

  const total = calcTotal(fwData[no]);
  const totalEl = document.getElementById(`total-${no}`);
  if(totalEl) totalEl.textContent = total ? fmt(total) : '';

  // 자동 저장 (디바운스)
  clearTimeout(el._saveTimer);
  el._saveTimer = setTimeout(() => autoSave(), 1500);
}

async function autoSave() {
  const ind = document.getElementById('fw-save-indicator');
  if(ind) ind.textContent = '저장 중...';
  const ok = await saveToStorage(`fw_data_${currentFw}`, fwData);
  if(ind) ind.textContent = ok ? '✓ 자동 저장됨' : '저장 실패';
  setTimeout(()=>{ if(ind && ind.textContent.includes('저장됨')) ind.textContent = ''; }, 3000);
}

function calcTotal(d) {
  if(!d) return 0;
  const er = cfgExRate || EXCHANGE_RATE;
  const usd = ((d.ofrt||0)+(d.lss||0)+(d.ams||0)+(d.etc_usd||0)) * er;
  const krw = (d.thc||0)+(d.inland||0)+(d.doc||0)+(d.wfg||0)+(d.sef||0)+(d.psc||0)+(d.psm||0)+(d.etc_krw||0);
  return usd + krw;
}

async function submitQuote() {
  const btn = document.getElementById('submit-btn');
  const status = document.getElementById('submit-status');
  const info = document.getElementById('submit-info');

  // 재제출 시 확인
  const prevSub = await loadFromStorage(`submission_${currentFw}`);
  if(prevSub && prevSub.submitted) {
    const prevTime = new Date(prevSub.submittedAt).toLocaleString('ko-KR');
    if(!confirm('이미 제출한 내역이 있어요.\n(' + prevTime + ')\n\n수정된 내용으로 다시 제출할까요?')) return;
  }

  btn.textContent = '제출 중...';
  btn.disabled = true;
  status.textContent = '';

  // 임시저장도 같이
  await saveToStorage(`fw_data_${currentFw}`, fwData);

  const submission = {
    fw: currentFw,
    data: fwData,
    submittedAt: new Date().toISOString(),
    submitted: true
  };

  const ok = await saveToStorage(`submission_${currentFw}`, submission);
  if(ok) {
    const timeStr = new Date().toLocaleString('ko-KR');
    status.textContent = '✓ 최종 제출 완료!';
    status.className = 'save-status saved';
    info.textContent = timeStr + ' 제출 · 수정이 필요하면 다시 입력 후 재제출 가능';
    showToast('견적이 제출되었습니다! 수정이 필요하면 언제든 재제출 가능해요.');
  } else {
    status.textContent = '제출 실패. 다시 시도해주세요.';
    status.className = 'save-status error';
  }
  btn.textContent = '✓ 최종 제출';
  btn.disabled = false;
}

async function refreshData() {
  await loadSelections();
  // 전체 포워더 제출 데이터 로드 (설정에서 불러온 목록 기준)
  const allFwdrs = (cfgForwarders && cfgForwarders.length > 0) ? cfgForwarders : FORWARDERS;
  for(const fw of allFwdrs) {
    const sub = await loadFromStorage(`submission_${fw}`);
    if(sub) allSubmissions[fw] = sub;
    else {
      const draft = await loadFromStorage(`fw_data_${fw}`);
      if(draft) allSubmissions[fw] = { fw, data: draft, submitted: false };
    }
  }
  renderDash();
  renderRankTable();
  renderReport();
  renderEval();
}

    'O/FRT\n(USD/CTNR)','LSS\n(USD/CTNR)','AMS/AFR\n(USD/CTNR)',
    'THC\n(원)','내륙운송료\n(원)','DOC\n(원)','WFG\n(원)','SEF\n(원)','PSC\n(원)','PSM\n(원)',
    '기타비용\n(원)','기타비용\n(USD)','★합계(원)',
    '적하보험요율\n(%)','주당항차수/\n출항요일','프리타임\n(최대/일)','비고·특이사항'
  ];
  hdrs.forEach(function(h,ci){ ws[R(4,ci)] = c(h, st.hdr); });

  // 행5~: 노선 데이터
  routes.forEach(function(r, idx) {
    var row = 5 + idx;
    var isEven = idx % 2 === 0;
    var lk = isEven ? st.lock1 : st.lock2;
    var ip = isEven ? st.inp1 : st.inp2;
    var ipL = isEven ? st.inpL1 : st.inpL2;
    var sm = isEven ? st.sum1 : st.sum2;
    var exRow = row + 1; // Excel 행번호 (1-based)

    // A~F: 고정 노선 정보
    ws[R(row,0)] = c(r.no||'', {...lk,font:{bold:true,sz:9,name:"맑은 고딕"}});
    ws[R(row,1)] = c(r.nation||'', lk);
    ws[R(row,2)] = c(r.site||'', lk);
    ws[R(row,3)] = c(r.port_o||'', lk);
    ws[R(row,4)] = c(r.port_i||'', lk);
    ws[R(row,5)] = c(r.ctnr||'', lk);
    // G: 예상물량
    ws[R(row,6)] = c(r.vol||'', {...lk, alignment:{horizontal:"right",vertical:"center"}});

    // H~J: USD 입력
    [7,8,9].forEach(function(ci){ ws[R(row,ci)] = c('', {...ip, z:'#,##0.00'}); });
    // K~Q: KRW 입력
    [10,11,12,13,14,15,16].forEach(function(ci){ ws[R(row,ci)] = c('', {...ip, z:'#,##0'}); });
    // R: 기타비용(원)
    ws[R(row,17)] = c('', {...ip, z:'#,##0'});
    // S: 기타비용(USD)
    ws[R(row,18)] = c('', {...ip, z:'#,##0.00'});
    // T: 합계 수식
    ws[R(row,19)] = c({f:'IFERROR((H'+exRow+'+I'+exRow+'+IF(OR(J'+exRow+'="",J'+exRow+'=0),0,J'+exRow+')+IF(OR(S'+exRow+'="",S'+exRow+'=0),0,S'+exRow+'))*J2+SUM(K'+exRow+':Q'+exRow+')+IF(ISNUMBER(R'+exRow+'),R'+exRow+',0),0)'}, {...sm, z:'#,##0'});
    // U: 적하보험요율
    ws[R(row,20)] = c('', {...ip, z:'0.00000%'});
    // V: 스케줄
    ws[R(row,21)] = c('', ipL);
    // W: 프리타임
    ws[R(row,22)] = c('', ipL);  // 프리타임: 텍스트
    // X: 비고
    ws[R(row,23)] = c('', ipL);
  });

  // 마지막 안내행
  var lastRow = 5 + routes.length;
  ws[R(lastRow,0)] = c('✅ 작성 완료 후 저장 → 홈페이지에서 📤 엑셀 업로드 버튼 클릭', st.foot);
  for(var ci=1;ci<COLS;ci++) ws[R(lastRow,ci)] = c('', st.foot);

  // 범위 설정
  ws['!ref'] = XS.utils.encode_range({r:0,c:0},{r:lastRow,c:COLS-1});

  // 병합
  ws['!merges'] = [
    {s:{r:0,c:0},e:{r:0,c:COLS-1}},
    {s:{r:1,c:1},e:{r:1,c:3}},
    {s:{r:1,c:5},e:{r:1,c:7}},
    {s:{r:2,c:0},e:{r:2,c:COLS-1}},
    {s:{r:3,c:0},e:{r:3,c:6}},
    {s:{r:3,c:7},e:{r:3,c:9}},
    {s:{r:3,c:10},e:{r:3,c:16}},
    {s:{r:3,c:17},e:{r:3,c:18}},
    {s:{r:3,c:20},e:{r:3,c:23}},
    {s:{r:lastRow,c:0},e:{r:lastRow,c:COLS-1}}
  ];

  // 열 너비
  ws['!cols'] = [
    {wch:4},{wch:8},{wch:7},{wch:9},{wch:8},{wch:7},{wch:8},
    {wch:8},{wch:8},{wch:8},
    {wch:9},{wch:9},{wch:7},{wch:7},{wch:7},{wch:7},{wch:7},
    {wch:10},{wch:10},
    {wch:13},
    {wch:16},{wch:14},{wch:8},{wch:18}
  ];

  // 행 높이
  ws['!rows'] = [{hpt:32},{hpt:24},{hpt:18},{hpt:22},{hpt:45}];
  for(var i=0;i<routes.length;i++) ws['!rows'].push({hpt:20});
  ws['!rows'].push({hpt:22});

  // 틀 고정 (G열 이후, 6행 이후)
  ws['!freeze'] = {xSplit:7, ySplit:5, state:'frozen'};

  var wb = XS.utils.book_new();
  XS.utils.book_append_sheet(wb, ws, '견적입력');

  var today = new Date().toISOString().slice(0,10).replace(/-/g,'');
  XS.writeFile(wb, '포워딩비딩_26하반기_' + currentFw + '_' + today + '.xlsx');
  showToast('양식 다운로드 완료! 노란 셀에 입력 후 업로드하세요.');
}

    if(typeof v === 'number') { cell.t='n'; if(fmt) cell.z=fmt; }
    else { cell.t='s'; }
    return cell;
  }

  const ws = {};
  const COLS = 15;
  const enc = XS.utils.encode_cell;
  const R = function(r,col) { return enc({r:r,c:col}); };

  // 행0: 제목
  ws[R(0,0)] = c('매일유업 포워딩 비딩 — 노선관리 업로드 양식', st.title);
  for(var ci=1;ci<COLS;ci++) ws[R(0,ci)] = c('', st.title);

  // 행1: 안내
  ws[R(1,0)] = c('※ 이 파일 작성 후 웹사이트 [설정 > 노선관리]에서 업로드하세요. NO·도착국가 필수. 비딩대상 N이면 제외.', st.notice);
  for(var ci=1;ci<COLS;ci++) ws[R(1,ci)] = c('', st.notice);

  // 행2: 그룹헤더
  var grp2 = [[0,6,'노선 정보',st.grpNv],[7,8,'📅 직전반기',st.grpGr],[9,10,'📅 이번반기',st.grpBl],[11,14,'추가 정보',st.grpGn]];
  grp2.forEach(function(g){ ws[R(2,g[0])]=c(g[2],g[3]); for(var ci=g[0]+1;ci<=g[1];ci++) ws[R(2,ci)]=c('',g[3]); });

  // 행3: 헤더
  var hdrs=['NO','도착국가','작업지','출발PORT','도착PORT','CTNR\n(20DRY/40DRY/20RF/40RF)','예상물량\n(CTN/반기)',
    '직전반기\n매출(원)','직전반기\n물류비(원)','이번반기\n매출(원)','이번반기\n물류비(원)',

    ws[R(row,10)]=c(r.plan_cost||'',{...cu,z:'#,##0'});
    ws[R(row,11)]=c('Y',lk);
    ws[R(row,12)]=c(r.product||'',inf);
    ws[R(row,13)]=c(r.customer||'',inf);
    ws[R(row,14)]=c(r.note||'',inf);
  });

  // 안내행
  var lastRow=4+cfgRoutes.length;
  ws[R(lastRow,0)]=c('H=직전반기매출 | I=직전반기물류비 | J=이번반기매출 | K=이번반기물류비 | 비워두면 C조건 물류비 물량비율 자동배분',st.foot);

    {s:{r:lastRow,c:0},e:{r:lastRow,c:COLS-1}}

  showToast('노선관리 양식 다운로드 완료!');
}

// 비딩 마감/활성화
// ══════════════════════════════════════════
let isBiddingClosed = false;

async function loadBiddingStatus() {
  const status = await loadFromStorage('bidding_status');
  isBiddingClosed = status?.closed === true;
  updateBiddingUI();
}

function updateBiddingUI() {
  const banner = document.getElementById('fw-closed-banner');
  const submitBtn = document.getElementById('submit-btn');
  const draftBtn = document.getElementById('draft-btn');
  if(banner) banner.style.display = isBiddingClosed ? 'block' : 'none';
  if(submitBtn) { submitBtn.disabled = isBiddingClosed; submitBtn.style.opacity = isBiddingClosed ? '0.4' : '1'; }
  if(draftBtn) { draftBtn.disabled = isBiddingClosed; draftBtn.style.opacity = isBiddingClosed ? '0.4' : '1'; }
  if(isBiddingClosed) {
    document.querySelectorAll('#fw-tbody input').forEach(inp => { inp.disabled = true; inp.style.background = '#eee'; });
  }
}

function clearAllData() {
  if(!confirm('입력한 모든 데이터를 초기화할까요?\n이 작업은 되돌릴 수 없어요.')) return;
  fwData = {};
  buildFwTable();
  // 저장소에서도 삭제
  saveToStorage('fw_data_' + currentFw, {});
  const status = document.getElementById('submit-status');
  const info = document.getElementById('submit-info');
  if(status) { status.textContent = ''; status.className = 'save-status'; }
  if(info) info.textContent = '';
  showToast('전체 초기화 완료!');
}
